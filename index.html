<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlexFlow Yoga</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>FlexFlow Yoga</h1>

<div class="card">
<h2>Create Routine</h2>
<input id="rname" placeholder="Routine name">
<input id="pname" placeholder="Pose name">
<input id="pdur" type="number" placeholder="Seconds">
<button onclick="addPose()">Add Pose</button>
<button onclick="saveRoutine()">Save Routine</button>
<ul id="poseList"></ul>
</div>

<div class="card">
<h2>My Routines</h2>
<ul id="routineList"></ul>
</div>

<div class="card">
<h2>Player</h2>
<h3 id="currentPose">Ready</h3>
<div id="timer">0</div>
<button onclick="startRoutine()">Start</button>
</div>

<div class="card">
<h2>Stats</h2>
<p>Completed Sessions: <span id="sessions">0</span></p>
</div>

<script src="app.js"></script>
</body>
</html>
